<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Fira+Code:wght@300;400;500;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --green: #f5f5f5;
      --green-dim: #bdbdbd;
      --green-glow: rgba(255,255,255,0.2);
      --cyan: #dedede;
      --yellow: #c8c8c8;
      --red: #ff4444;
      --gray: #555;
      --gray-light: #888;
      --white: #e8e8e8;
      --font: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
      overflow: hidden;
    }

    /* ── STATE SCREENS ── */
    #boot {
      position: fixed; inset: 0;
      background: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 1000;
      transition: opacity 0.6s ease;
    }
    #boot.fade-out { opacity: 0; pointer-events: none; }
    #boot.hidden { display: none; }
    #boot-logs {
      width: min(640px, 86vw);
      color: #f0f0f0;
      font-size: 28px;
      line-height: 1.35;
      white-space: pre-line;
      margin-bottom: 24px;
      align-self: center;
    }

    #boot-bar-wrap {
      width: min(320px, 30vw);
      border: 1px solid var(--green-dim);
      padding: 4px;
      position: fixed;
      left: 70px;
      bottom: 56px;
    }
    #boot-bar {
      height: 6px;
      background: var(--green);
      width: 0%;
      transition: width 0.08s linear;
      box-shadow: 0 0 10px var(--green);
    }
    #boot-text {
      color: var(--green-dim);
      font-size: 12px;
      margin-top: 10px;
      text-align: left;
      width: min(320px, 30vw);
      height: 18px;
      position: fixed;
      left: 70px;
      bottom: 28px;
    }

    /* ── LAYOUT ── */
    #app {
      display: flex; flex-direction: column;
      height: 100vh;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #app.visible { opacity: 1; }

    /* ── STATUS BAR ── */
    #statusbar {
      height: 24px;
      background: #060606;
      border-bottom: 1px solid #171717;
      color: #cfcfcf;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      font-size: 11px;
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }
    .status-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #fullscreen-btn {
      cursor: pointer;
      color: #d9d9d9;
      user-select: none;
    }

    /* ── TITLE BAR ── */
    #titlebar {
      background: #0d0d0d;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px;
      flex-shrink: 0;
      user-select: none;
    }
    .tb-dots { display: flex; gap: 7px; }
    .tb-dot {
      width: 13px; height: 13px; border-radius: 50%;
      cursor: pointer; transition: filter 0.2s;
    }
    .tb-dot:hover { filter: brightness(1.4); }
    .tb-dot.red    { background: #ff5f57; }
    .tb-dot.yellow { background: #febc2e; }
    .tb-dot.green  { background: #28c840; }
    .tb-title {
      color: var(--gray-light);
      font-size: 12px;
      position: absolute; left: 50%; transform: translateX(-50%);
    }
    .tb-power {
      color: var(--gray);
      font-size: 18px;
      cursor: pointer;
      transition: color 0.2s;
      line-height: 1;
    }
    .tb-power:hover { color: var(--red); }

    /* ── TERMINAL BODY ── */
    #terminal {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      scroll-behavior: smooth;
    }
    #terminal::-webkit-scrollbar { width: 6px; }
    #terminal::-webkit-scrollbar-track { background: transparent; }
    #terminal::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

    /* ── OUTPUT LINES ── */
    .line { margin-bottom: 2px; white-space: pre-wrap; word-break: break-word; }
    .line-gap { height: 8px; }

    .prompt-line {
      display: flex; align-items: flex-start; gap: 0;
      margin-top: 6px;
    }
    .prompt-text { color: var(--green); white-space: nowrap; flex-shrink: 0; }
    .prompt-cmd  { color: var(--white); margin-left: 4px; }

    .c-green  { color: var(--green); }
    .c-cyan   { color: var(--cyan); }
    .c-yellow { color: var(--yellow); }
    .c-red    { color: var(--red); }
    .c-gray   { color: var(--gray-light); }
    .c-white  { color: var(--white); }
    .c-dim    { color: var(--gray); }
    .bold     { font-weight: 700; }

    /* ── ASCII ART ── */
    .ascii-art {
      color: var(--green);
      font-size: clamp(4px, 0.85vw, 9.5px);
      line-height: 1.1;
      white-space: pre;
      text-shadow: 0 0 6px rgba(255,255,255,0.2);
      margin: 8px 0;
    }

    .figlet {
      color: var(--green);
      font-size: clamp(5px, 0.9vw, 10px);
      line-height: 1.15;
      white-space: pre;
      text-shadow: 0 0 8px rgba(255,255,255,0.25);
      margin: 8px 0;
    }
    .hero {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .hero-mark {
      font-size: clamp(7px, 1vw, 12px);
      white-space: pre;
      line-height: 1.05;
    }
    .hero-name {
      font-size: clamp(10px, 1.2vw, 16px);
      white-space: pre;
      line-height: 1.05;
    }

    /* ── INPUT BAR ── */
    #input-area {
      border-top: 1px solid var(--border);
      background: #090909;
      padding: 8px 24px;
      display: flex; align-items: center; gap: 4px;
      flex-shrink: 0;
    }
    #prompt-prefix { color: var(--green); white-space: nowrap; flex-shrink: 0; font-weight: 500; }
    #cmd-input {
      flex: 1;
      background: transparent;
      border: none; outline: none;
      color: var(--white);
      font-family: var(--font);
      font-size: 14px;
      caret-color: var(--green);
    }
    #cmd-input::placeholder { color: var(--gray); }

    /* ── SCANLINES overlay ── */
    #scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 9999;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
    }

    /* ── CRT flicker ── */
    @keyframes flicker {
      0%,100% { opacity: 1; }
      92%      { opacity: 1; }
      93%      { opacity: 0.96; }
      94%      { opacity: 1; }
    }
    #app { animation: flicker 8s infinite; }

    #footerbar {
      height: 26px;
      border-top: 1px solid #1a1a1a;
      background: #070707;
      color: #b0b0b0;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      flex-shrink: 0;
    }

    #suspend-screen,
    #shutdown-screen {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 1200;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #e9e9e9;
      text-align: center;
    }
    #suspend-screen.visible,
    #shutdown-screen.visible {
      display: flex;
    }
    #suspend-title {
      letter-spacing: 2px;
      margin-bottom: 12px;
    }
    #suspend-sub {
      color: #c3c3c3;
      margin-bottom: 26px;
    }
    #suspend-power {
      font-size: 72px;
      cursor: pointer;
      color: #f5f5f5;
      text-shadow: 0 0 16px rgba(255,255,255,0.45);
      line-height: 1;
    }
    #shutdown-logs {
      width: min(640px, 86vw);
      color: #d9d9d9;
      text-align: left;
      white-space: pre-line;
      font-size: 14px;
      line-height: 1.4;
    }

    /* ── HELP TABLE ── */
    .help-row { display: flex; gap: 16px; margin-bottom: 2px; }
    .help-cmd  { color: var(--green); min-width: 130px; }
    .help-desc { color: var(--gray-light); }

    /* ── SECTION HEADER ── */
    .section-hdr {
      color: var(--cyan);
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
      margin: 4px 0 8px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 12px;
    }

    /* ── SKILL TAG ── */
    .tag {
      display: inline-block;
      border: 1px solid var(--green-dim);
      color: var(--green);
      padding: 1px 8px;
      margin: 2px 3px 2px 0;
      font-size: 12px;
      border-radius: 2px;
    }
    .tag-blue {
      border-color: var(--cyan);
      color: var(--cyan);
    }
    .tag-yellow {
      border-color: var(--yellow);
      color: var(--yellow);
    }

    /* ── TYPEWRITER cursor ── */
    .typing::after {
      content: '█';
      color: var(--green);
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0; }
    }

    /* ── PROJECT CARD ── */
    .proj-card {
      border: 1px solid var(--border);
      padding: 12px 16px;
      margin: 6px 0;
      position: relative;
      transition: border-color 0.2s;
    }
    .proj-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--green);
    }
    .proj-title { color: var(--yellow); font-weight: 700; margin-bottom: 4px; }
    .proj-desc  { color: var(--gray-light); font-size: 13px; margin-bottom: 6px; }
    .proj-link  { color: var(--cyan); text-decoration: none; font-size: 12px; }
    .proj-link:hover { text-decoration: underline; }

    /* ── EXP CARD ── */
    .exp-card { margin: 8px 0; padding-left: 16px; border-left: 2px solid var(--green-dim); }
    .exp-company { color: var(--yellow); font-weight: 700; }
    .exp-role    { color: var(--cyan); font-size: 13px; }
    .exp-date    { color: var(--gray); font-size: 12px; }
    .exp-bullet  { color: var(--gray-light); font-size: 13px; margin-top: 4px; }
    .exp-bullet::before { content: '▸ '; color: var(--green); }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      html, body { font-size: 12px; }
      #terminal  { padding: 12px 14px; }
      #input-area{ padding: 8px 14px; }
      .ascii-art, .figlet { font-size: clamp(3px, 2.5vw, 7px); }
      #boot-bar-wrap, #boot-text { left: 20px; width: 180px; }
    }
  </style>
</head>

function h(tag, cls, text) {
  const el = document.createElement(tag);
  if (cls) el.className = cls;
  if (text !== undefined) el.innerHTML = text;
  return el;
}

function line(html, cls = 'line') {
  const el = document.createElement('div');
  el.className = cls;
  el.innerHTML = html;
  terminal.appendChild(el);
}
function gap() { terminal.appendChild(h('div','line-gap')); }

function scroll() {
  terminal.scrollTop = terminal.scrollHeight;
}

function addPromptLine(cmd) {
  const div = h('div','prompt-line');
  div.innerHTML = `<span class="prompt-text">visitor@abhinavkarn:~$</span><span class="prompt-cmd">&nbsp;${escHtml(cmd)}</span>`;
  terminal.appendChild(div);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─────────────────────────────────────────────
//  EXECUTE
// ─────────────────────────────────────────────
function execute(raw) {
  const trimmed = raw.trim();
  if (!trimmed) return;

  history.unshift(trimmed);
  histIdx = -1;
  addPromptLine(trimmed);

  const parts = trimmed.split(/\s+/);
  const cmd   = parts[0].toLowerCase();
  const args  = parts.slice(1);

  if (CMD[cmd]) {
    CMD[cmd](args);
  } else {
    gap();
    line(`<span class="c-red">Command not found: ${escHtml(cmd)}</span>`);
    line(`<span class="c-gray">Type </span><span class="c-yellow">help</span><span class="c-gray"> to see available commands.</span>`);
    gap();
  }
  scroll();
}

// ─────────────────────────────────────────────
//  INPUT EVENTS
// ─────────────────────────────────────────────
input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const v = input.value;
    input.value = '';
    tabBuf = ''; tabMatches = []; tabIdx = 0;
    execute(v);

  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < history.length - 1) { histIdx++; input.value = history[histIdx]; }

  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) { histIdx--; input.value = history[histIdx]; }
    else { histIdx = -1; input.value = ''; }

  } else if (e.key === 'Tab') {
    e.preventDefault();
    const val = input.value.trim();
    if (val !== tabBuf) {
      tabBuf = val;
      tabMatches = COMMANDS.filter(c => c.startsWith(val));
      tabIdx = 0;
    }
    if (tabMatches.length === 1) {
      input.value = tabMatches[0];
    } else if (tabMatches.length > 1) {
      input.value = tabMatches[tabIdx % tabMatches.length];
      tabIdx++;
    }

  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    CMD.clear();
  }
});

// ─────────────────────────────────────────────
//  BOOT SEQUENCE
// ─────────────────────────────────────────────
let bootStart = Date.now();
let powerBusy = false;

function reboot() {
  const boot = document.getElementById('boot');
  const app  = document.getElementById('app');
  app.classList.remove('visible');
  boot.classList.remove('hidden','fade-out');
  boot.style.opacity = '1';
  terminal.innerHTML = '';
  bootStart = Date.now();
  runBoot('cold');
}

function clearTerm() { CMD.clear(); input.focus(); }

function bindTitlebarControls() {
  const power = document.getElementById('btn-power');
  const rebootDot = document.getElementById('btn-reboot-dot');
  const clearDot = document.getElementById('btn-clear-dot');
  const suspendPower = document.getElementById('suspend-power');
  const fullBtn = document.getElementById('fullscreen-btn');

  if (power) power.addEventListener('click', beginShutdown);
  if (rebootDot) rebootDot.addEventListener('click', beginShutdown);
  if (clearDot) clearDot.addEventListener('click', clearTerm);
  if (suspendPower) suspendPower.addEventListener('click', wakeFromSuspend);
  if (fullBtn) fullBtn.addEventListener('click', toggleFullscreen);
}

function renderShutdownLogs() {
  const el = document.getElementById('shutdown-logs');
  if (!el) return;
  el.textContent = `[ OK ] Stopping Network Manager...
[ OK ] Disconnecting active network interfaces...
[ OK ] Stopping User Sessions...
[ OK ] TTY1`;
}

function beginShutdown() {
  if (powerBusy) return;
  powerBusy = true;
  const shutdown = document.getElementById('shutdown-screen');
  const suspend = document.getElementById('suspend-screen');
  const app = document.getElementById('app');
  renderShutdownLogs();
  app.classList.remove('visible');
  shutdown.classList.add('visible');
  suspend.classList.remove('visible');
  setTimeout(() => {
    shutdown.classList.remove('visible');
    suspend.classList.add('visible');
    powerBusy = false;
  }, 1700);
}

function wakeFromSuspend() {
  if (powerBusy) return;
  powerBusy = true;
  document.getElementById('suspend-screen').classList.remove('visible');
  const boot = document.getElementById('boot');
  boot.classList.remove('hidden', 'fade-out');
  boot.style.opacity = '1';
  terminal.innerHTML = '';
  bootStart = Date.now();
  runBoot('resume');
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
}

function startStatusClock() {
  const timeEl = document.getElementById('status-time');
  if (!timeEl) return;
  const tick = () => {
    const now = new Date();
    const date = now.toLocaleDateString('en-GB', { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric' });
    const time = now.toLocaleTimeString('en-GB', { hour12: false });
    timeEl.textContent = `${date} ${time}`;
  };
  tick();
  setInterval(tick, 1000);
}

async function resolveStatusLocation(lat, lon) {
  let place = '';
  let tempLabel = '';

  try {
    const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
    if (geoRes.ok) {
      const geoData = await geoRes.json();
      const addr = geoData.address || {};
      const city = addr.city || addr.town || addr.village || addr.state_district || 'Unknown';
      const state = addr.state || addr.region || '';
      place = state ? `${city}, ${state}` : city;
    }
  } catch (_) {}

  try {
    const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m`);
    if (weatherRes.ok) {
      const weatherData = await weatherRes.json();
      const t = weatherData?.current?.temperature_2m;
      if (typeof t === 'number') tempLabel = `${Math.round(t)}°C`;
    }
  } catch (_) {}

  if (!place) place = `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
  statusLocationText = tempLabel ? `${place} ${tempLabel}` : place;
  const statusLeft = document.getElementById('status-left');
  if (statusLeft) statusLeft.textContent = statusLocationText;
}

function startStatusLocation() {
  const statusLeft = document.getElementById('status-left');
  if (statusLeft) statusLeft.textContent = statusLocationText;

  if (!navigator.geolocation) {
    statusLocationText = 'Location unavailable';
    if (statusLeft) statusLeft.textContent = statusLocationText;
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (position) => {
      const { latitude, longitude } = position.coords;
      resolveStatusLocation(latitude, longitude);
    },
    () => {
      statusLocationText = 'Location permission denied';
      if (statusLeft) statusLeft.textContent = statusLocationText;
    },
    { enableHighAccuracy: false, timeout: 10000, maximumAge: 300000 }
  );
}

function runBoot(mode = 'cold') {
  const bar  = document.getElementById('boot-bar');
  const text = document.getElementById('boot-text');
  const logs = document.getElementById('boot-logs');
  const boot = document.getElementById('boot');
  const app  = document.getElementById('app');

  const messages = mode === 'resume'
    ? [
      '[SYSTEM] Resuming Network Manager...',
      '[NETWORK] Connection restored',
      '[DEVICE] Filesystems mounted',
      '[SECURITY] Firewalls active',
      '',
      'GETTING SYSTEM READY...'
    ]
    : [
      '[SYSTEM] Initializing kernel...',
      '[NETWORK] Bringing interfaces online',
      '[DEVICE] Mounting /dev/portfolio',
      '[SERVICE] Starting terminal daemon',
      '[SESSION] Spawning shell',
      '',
      'GETTING SYSTEM READY...'
    ];

  bar.style.width = '0%';
  logs.textContent = messages.join('\n');
  text.textContent = 'Boot sequence in progress...';
  let step = 0;
  const interval = setInterval(() => {
    step++;
    const pct = Math.min(step * 16, 100);
    bar.style.width = pct + '%';
    text.textContent = pct >= 100 ? 'System online.' : `Loading... ${pct}%`;
    if (pct >= 100) {
      clearInterval(interval);
      setTimeout(() => {
        boot.classList.add('fade-out');
        app.classList.add('visible');
        setTimeout(() => {
          boot.classList.add('hidden');
          printWelcome();
          input.focus();
          powerBusy = false;
        }, 600);
      }, 400);
    }
  }, 220);
}

bindTitlebarControls();
